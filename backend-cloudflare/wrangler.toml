name = "kuaile8-backend"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# D1 数据库
[[d1_databases]]
binding = "DB"
database_name = "kuaile8"
database_id = "3c74fa00-95b6-49fe-9ded-ea5a31090f92"

# KV 存储（用于缓存）
[[kv_namespaces]]
binding = "CACHE"
id = "405350a470ff46cc92b3b2a44e1c6e91"

# 环境变量
[vars]
ENVIRONMENT = "production"

# 密钥（使用 wrangler secret put 设置）
# wrangler secret put JWT_SECRET
# wrangler secret put CRON_SECRET
# wrangler secret put LOTTERY_API_ID
# wrangler secret put LOTTERY_API_KEY

# 定时任务（每5分钟采集一次数据）
[triggers]
crons = ["*/5 * * * *"]
